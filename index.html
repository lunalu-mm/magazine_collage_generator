<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FF14玩家拼貼產生器</title>
<style>
  :root{--bg:#f4efe6;--ink:#2f3437;--muted:#6e777c;--line:#ddd6ca;--card:#fffaf1}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,#f6f2ea,#e8eef0);color:var(--ink)}
  .wrap{max-width:1220px;margin:auto;padding:28px}
  h1{margin:0 0 6px;font-size:28px}
  p{margin:0;color:var(--muted)}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:24px;margin-top:22px}
  .panel{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 14px 40px rgba(40,35,25,.08)}
  label{display:block;margin:14px 0 6px;font-weight:700;font-size:14px}
  input,select,button{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:15px;background:white}
  input[type=file]{padding:9px}
  input[type=range]{padding:0}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rangeLine{display:grid;grid-template-columns:1fr 54px;gap:10px;align-items:center}
  .rangeLine output{font-size:12px;color:#666;text-align:right}
  .groupTitle{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-weight:900;color:#564c41}
  button{margin-top:14px;background:#2f3437;color:white;border:none;font-weight:800;cursor:pointer}
  button.secondary{background:#fff;color:#2f3437;border:1px solid var(--line)}
  .stage{display:flex;justify-content:center;align-items:center;min-height:650px}
  canvas{width:100%;max-width:900px;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.16);background:#eee}
  .hint{font-size:12px;line-height:1.7;margin-top:12px;color:#7b7368}
  @media(max-width:900px){.grid{grid-template-columns:1fr}.stage{min-height:auto}.wrap{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>FF14 玩家雜誌風拼貼產生器</h1>

  <div class="grid">
    <div class="panel">
      <label>左側全身照</label>
      <input id="leftImg" type="file" accept="image/*">

      <label>右側特寫照</label>
      <input id="rightImg" type="file" accept="image/*">

      <label>角色名稱</label>
      <input id="name" value="Luna Lu" placeholder="例如：Luna Lu">

      <label>副標文字</label>
      <input id="subtitle" value="✦ FINAL FANTASY XIV ✦">

      <div class="row">
        <div>
          <label>色調</label>
          <select id="tone">
            <option value="warm">暖金白</option>
            <option value="soft">柔霧白</option>
            <option value="dark">暗黑雜誌</option>
          </select>
        </div>
        
      </div>

      <div class="groupTitle">中間淡化過渡</div>
      <label>淡化寬度</label>
      <div class="rangeLine">
        <input id="fadeWidth" type="range" min="80" max="360" value="210">
        <output id="fadeWidthOut">210</output>
      </div>

      <label>淡化中心位置</label>
      <div class="rangeLine">
        <input id="fadeCenter" type="range" min="420" max="650" value="535">
        <output id="fadeCenterOut">535</output>
      </div>

      <div class="groupTitle">左圖調整</div>
      <label>左圖縮放</label>
      <div class="rangeLine">
        <input id="leftScale" type="range" min="0.7" max="2.2" step="0.01" value="1">
        <output id="leftScaleOut">1.00</output>
      </div>
      <div class="row">
        <div>
          <label>左圖左右</label>
          <div class="rangeLine"><input id="leftX" type="range" min="-250" max="250" value="0"><output id="leftXOut">0</output></div>
        </div>
        <div>
          <label>左圖上下</label>
          <div class="rangeLine"><input id="leftY" type="range" min="-250" max="250" value="0"><output id="leftYOut">0</output></div>
        </div>
      </div>

      <div class="groupTitle">右圖調整</div>
      <label>右圖縮放</label>
      <div class="rangeLine">
        <input id="rightScale" type="range" min="0.7" max="2.2" step="0.01" value="1">
        <output id="rightScaleOut">1.00</output>
      </div>
      <div class="row">
        <div>
          <label>右圖左右</label>
          <div class="rangeLine"><input id="rightX" type="range" min="-250" max="250" value="0"><output id="rightXOut">0</output></div>
        </div>
        <div>
          <label>右圖上下</label>
          <div class="rangeLine"><input id="rightY" type="range" min="-250" max="250" value="0"><output id="rightYOut">0</output></div>
        </div>
      </div>

      <button id="generate">生成拼貼</button>
      <button id="reset" class="secondary">重設照片位置</button>
      <button id="download" class="secondary">下載 PNG</button>
    </div>

    <div class="panel stage">
      <canvas id="canvas" width="1080" height="900"></canvas>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let leftImage = null;
let rightImage = null;

const ids = [
  'name','subtitle','tone','fadeWidth','fadeCenter',
  'leftScale','leftX','leftY','rightScale','rightX','rightY'
];

function updateOutputs(){
  ['fadeWidth','fadeCenter','leftX','leftY','rightX','rightY'].forEach(id=>{
    document.getElementById(id+'Out').textContent = document.getElementById(id).value;
  });
  ['leftScale','rightScale'].forEach(id=>{
    document.getElementById(id+'Out').textContent = Number(document.getElementById(id).value).toFixed(2);
  });
}

ids.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { updateOutputs(); draw(); });
  el.addEventListener('change', () => { updateOutputs(); draw(); });
});

function loadFile(input, cb){
  const file = input.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = () => cb(img);
  img.src = URL.createObjectURL(file);
}

document.getElementById('leftImg').addEventListener('change', e => {
  loadFile(e.target, img => { leftImage = img; draw(); });
});
document.getElementById('rightImg').addEventListener('change', e => {
  loadFile(e.target, img => { rightImage = img; draw(); });
});
document.getElementById('generate').addEventListener('click', draw);

function val(id){ return Number(document.getElementById(id).value); }

function coverDrawTo(targetCtx, img, x, y, w, h, biasX=0.5, biasY=0.5, scale=1, offsetX=0, offsetY=0){
  if(!img) return;
  const r = Math.max(w/img.width, h/img.height) * scale;
  const nw = img.width*r, nh = img.height*r;
  const dx = x + (w-nw)*biasX + offsetX;
  const dy = y + (h-nh)*biasY + offsetY;
  targetCtx.drawImage(img, dx, dy, nw, nh);
}

function drawPlaceholder(){
  ctx.fillStyle = '#f7f1e8';
  ctx.fillRect(0,0,1080,900);
  ctx.fillStyle = '#c8bfae';
  ctx.font = '700 38px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('上傳照片後按「生成拼貼」',540,430);
  ctx.font = '22px sans-serif';
  ctx.fillText('左：全身照　右：特寫照',540,470);
}

function addTone(tone){
  const g = ctx.createLinearGradient(0,0,1080,900);
  if(tone === 'dark'){
    g.addColorStop(0,'rgba(25,25,25,.18)');
    g.addColorStop(1,'rgba(0,0,0,.35)');
  }else if(tone === 'soft'){
    g.addColorStop(0,'rgba(255,255,255,.34)');
    g.addColorStop(1,'rgba(225,235,238,.20)');
  }else{
    g.addColorStop(0,'rgba(255,250,230,.36)');
    g.addColorStop(.55,'rgba(255,239,200,.14)');
    g.addColorStop(1,'rgba(245,220,175,.20)');
  }
  ctx.fillStyle = g;
  ctx.fillRect(0,0,1080,900);
}

function draw(){
  updateOutputs();
  const tone = document.getElementById('tone').value;
  ctx.clearRect(0,0,1080,900);

  if(!leftImage && !rightImage){ drawPlaceholder(); return; }

  ctx.fillStyle = tone === 'dark' ? '#171717' : '#f8f2e7';
  ctx.fillRect(0,0,1080,900);

  // 左圖完整繪製
  if(leftImage){
    coverDrawTo(
      ctx, leftImage, 0, 0, 590, 900, .47, .5,
      val('leftScale'), val('leftX'), val('leftY')
    );
  }

  // 右圖使用完整遮罩，不再只留下局部區域
  const temp = document.createElement('canvas');
  temp.width = 1080;
  temp.height = 900;
  const tctx = temp.getContext('2d');

  coverDrawTo(
    tctx, rightImage, 455, 0, 625, 900, .52, .5,
    val('rightScale'), val('rightX'), val('rightY')
  );

  const center = val('fadeCenter');
  const width = val('fadeWidth');
  const start = center - width/2;
  const end = center + width/2;

  // 修正：用「全畫布遮罩」處理右圖透明度。
  // 0~start 完全透明，start~end 淡入，end~1080 完全不透明。
  // 這樣右圖右半邊一定會完整保留，不會被裁掉或整張消失。
  const safeStart = Math.max(0, start);
  const safeEnd = Math.min(1080, end);

  const mask = tctx.createLinearGradient(0,0,1080,0);
  mask.addColorStop(0,'rgba(0,0,0,0)');
  mask.addColorStop(safeStart / 1080,'rgba(0,0,0,0)');
  mask.addColorStop(safeEnd / 1080,'rgba(0,0,0,1)');
  mask.addColorStop(1,'rgba(0,0,0,1)');

  tctx.globalCompositeOperation = 'destination-in';
  tctx.fillStyle = mask;
  tctx.fillRect(0,0,1080,900);
  tctx.globalCompositeOperation = 'source-over';

  ctx.drawImage(temp,0,0);

  // 中間柔霧亮帶，只做柔化，不裁切照片
  const mist = ctx.createLinearGradient(center-width*.9,0,center+width*.9,0);
  mist.addColorStop(0,'rgba(255,255,255,0)');
  mist.addColorStop(.5, tone === 'dark' ? 'rgba(20,20,20,.20)' : 'rgba(255,255,255,.34)');
  mist.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = mist;
  ctx.fillRect(center-width,0,width*2,900);

  addTone(tone);

  const vg = ctx.createRadialGradient(540,450,220,540,450,760);
  vg.addColorStop(0,'rgba(255,255,255,0)');
  vg.addColorStop(1, tone === 'dark' ? 'rgba(0,0,0,.28)' : 'rgba(80,55,20,.08)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,1080,900);

  const name = document.getElementById('name').value || 'Character Name';
  const subtitle = document.getElementById('subtitle').value || '✦ FINAL FANTASY XIV ✦';

  ctx.textAlign = 'left';
  ctx.fillStyle = tone === 'dark' ? 'rgba(255,255,255,.88)' : 'rgba(45,52,55,.92)';
  // 改成較細的黑體字，尺寸縮小
  ctx.font = '300 26px "Noto Sans TC","Microsoft JhengHei",sans-serif';
  ctx.fillText(name, 42, 58);

  ctx.fillStyle = tone === 'dark' ? 'rgba(255,255,255,.68)' : 'rgba(45,52,55,.70)';
  ctx.font = '400 14px "Noto Sans TC","Microsoft JhengHei",sans-serif';
  ctx.fillText(subtitle, 42, 78);
  ctx.textAlign = 'center';
  ctx.fillStyle = tone === 'dark' ? 'rgba(255,255,255,.62)' : 'rgba(45,52,55,.62)';
  ctx.font = '12px sans-serif';
  ctx.fillText('© SQUARE ENIX • Fan Work by Lunalu', 540, 870);

}

document.getElementById('reset').addEventListener('click', () => {
  const resetValues = {
    fadeWidth:210, fadeCenter:535,
    leftScale:1, leftX:0, leftY:0,
    rightScale:1, rightX:0, rightY:0
  };
  Object.entries(resetValues).forEach(([id,v]) => document.getElementById(id).value = v);
  updateOutputs();
  draw();
});

document.getElementById('download').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'ff14-magazine-collage.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

updateOutputs();
draw();
</script>
</body>
</html>
